[global]
# Repo host is the pgbackrest container; connect via SSH as the pgbackrest user.
# Port 2222 is used because OwnBase drops CAP_NET_BIND_SERVICE, preventing
# the pgbackrest server from binding to port 22.
repo1-host=pgbackrest
repo1-host-port=2222
repo1-host-user=pgbackrest
log-level-console=info
log-path=/var/log/pgbackrest

[main]
pg1-path=/var/lib/postgresql/data
pg1-port=5432
